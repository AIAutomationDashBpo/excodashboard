<!DOCTYPE html>
<html lang="en" style="height:100%;background:#080f1c">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Dashboard{% endblock %} — Brainbase Ops</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
  <link rel="stylesheet" href="/static/css/custom.css"/>
</head>
<body style="height:100%;display:flex;background:#080f1c;color:#cbd5e1;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;font-size:13px">

<!-- Left Sidebar -->
<aside class="sidebar">
  <a href="/metrics" class="sidebar-logo" title="Brainbase Ops">
    <svg width="16" height="16" fill="white" viewBox="0 0 20 20">
      <path d="M2 11a1 1 0 011-1h2a1 1 0 011 1v5a1 1 0 01-1 1H3a1 1 0 01-1-1v-5zm6-4a1 1 0 011-1h2a1 1 0 011 1v9a1 1 0 01-1 1H9a1 1 0 01-1-1V7zm6-3a1 1 0 011-1h2a1 1 0 011 1v12a1 1 0 01-1 1h-2a1 1 0 01-1-1V4z"/>
    </svg>
  </a>

  <a href="/metrics" class="nav-icon {% if active_tab == 'metrics' %}active{% endif %}">
    <svg width="17" height="17" fill="currentColor" viewBox="0 0 20 20"><path d="M2 11a1 1 0 011-1h2a1 1 0 011 1v5a1 1 0 01-1 1H3a1 1 0 01-1-1v-5zm6-4a1 1 0 011-1h2a1 1 0 011 1v9a1 1 0 01-1 1H9a1 1 0 01-1-1V7zm6-3a1 1 0 011-1h2a1 1 0 011 1v12a1 1 0 01-1 1h-2a1 1 0 01-1-1V4z"/></svg>
    Metrics
  </a>
  <a href="/billing" class="nav-icon {% if active_tab == 'billing' %}active{% endif %}">
    <svg width="17" height="17" fill="currentColor" viewBox="0 0 20 20"><path d="M4 4a2 2 0 00-2 2v4a2 2 0 002 2V6h10a2 2 0 00-2-2H4zm2 6a2 2 0 012-2h8a2 2 0 012 2v4a2 2 0 01-2 2H8a2 2 0 01-2-2v-4zm6 4a2 2 0 100-4 2 2 0 000 4z"/></svg>
    Billing
  </a>
  <a href="/insights" class="nav-icon {% if active_tab == 'insights' %}active{% endif %}">
    <svg width="17" height="17" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10c0 3.866-3.582 7-8 7a8.841 8.841 0 01-4.083-.98L2 17l1.338-3.123C2.493 12.767 2 11.434 2 10c0-3.866 3.582-7 8-7s8 3.134 8 7zM7 9H5v2h2V9zm8 0h-2v2h2V9zM9 9h2v2H9V9z" clip-rule="evenodd"/></svg>
    Conversation Insights
  </a>
  <a href="/uptime" class="nav-icon {% if active_tab == 'uptime' %}active{% endif %}">
    <svg width="17" height="17" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>
    Uptime
  </a>

  <div style="flex:1"></div>

  <a href="#" class="nav-icon" title="Settings">
    <svg width="18" height="18" fill="currentColor" viewBox="0 0 20 20">
      <path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"/>
    </svg>
  </a>
</aside>

<!-- Page wrapper -->
<div style="margin-left:168px;flex:1;display:flex;flex-direction:column;min-height:100vh;overflow:hidden">
  {% block content %}{% endblock %}
</div>

<script>
function applyFilters() {
  const params = new URLSearchParams(window.location.search);
  const worker = document.getElementById('workerSelect')?.value;
  const env    = document.getElementById('envSelect')?.value;
  const from   = document.getElementById('fromDate')?.value;
  const to     = document.getElementById('toDate')?.value;
  if (worker !== undefined) params.set('worker_id', worker);
  if (env    !== undefined) params.set('env', env);
  if (from   !== undefined) params.set('from_date', from);
  if (to     !== undefined) params.set('to_date', to);
  window.location.search = params.toString();
}
</script>

{% block scripts %}{% endblock %}
</body>
</html>
