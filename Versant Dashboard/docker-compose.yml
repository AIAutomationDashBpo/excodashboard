version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: brainbase_db
    environment:
      POSTGRES_DB: brainbase_dashboard
      POSTGRES_USER: dashboard
      POSTGRES_PASSWORD: localpassword
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dashboard -d brainbase_dashboard"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: brainbase_app
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  db_data:
